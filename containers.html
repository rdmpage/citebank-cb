<html>
<head>
	<meta charset="UTF-8">
	
	<link rel="stylesheet" href="css/main.css">
	
	<style>
		.multicolumn ul {
			columns: 200px;
			list-style: none;
			font-size:0.8em;
		}
		.multicolumn li {
			width:200px;
			white-space: nowrap; 
			overflow: hidden;
			text-overflow: ellipsis;
			line-height:1.2em;
		}	
			
		.csl-entry {
			text-indent: 2em hanging;
			/*
			padding:0.3em;
			margin-left:1em;
			*/
		}

		/* Per-year page-coverage ruler: full extent of pages seen that year,
		   with a block per article. Gaps = pages we have no article for. */
		.coverage {
			position: relative;
			height: 14px;
			margin: 0.2em 0 0.5em;
			background: #eef0f2;
			border: 1px solid #d8dee6;
			border-radius: 3px;
		}
		.coverage .seg {
			position: absolute;
			top: 0;
			bottom: 0;
			min-width: 1px;
			background: rgba(10, 102, 194, 0.5);
		}
		.coverage-caption {
			font-size: 0.75em;
			color: #6b7480;
			margin: 0 0 0.6em;
		}
	</style>
	
	<script src="js/citation.js" type="text/javascript"></script>
	<script>
		const Cite = require('citation-js')
	</script>
	
</head>
<body>

<h1>CiteBank</h1>

<h2>
	<a href=".">Home</a>
	|
	Containers 
	| 
	<a href="authors.html">Authors</a>
	| 
	<a href="years.html">Years</a>	
</h2>

<div id = "letters"></div>

<div style="clear:both;"></div>

<div id = "containers">
<div id = "works">

</div>


<script>
	function escapeHtml(s) {
		if (s === null || s === undefined) return '';
		return String(s)
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;')
			.replace(/'/g, '&#39;');
	}

	const urlParams = new URLSearchParams(window.location.search);

	function list_containers(letter) {

		var url = "api.php?container&letter=" + letter;

		fetch(url).then(
			function(response){
				if (response.status != 200) {
					console.log("Looks like there was a problem. Status Code: " + response.status);
					return;
				}
						
				response.json().then(function(data) {
					var html = "<h2>" + letter + "</h2>";
					
					html += '<div class="multicolumn">';
					html += '<ul>';

					for (var i in data) {
						var c = data[i];
						html += '<li><a href="?cid=' + encodeURIComponent(c.id) + '">' + escapeHtml(c.name) + '</a>';
						if (c.count > 1) { html += ' <span style="color:#999;">(' + c.count + ')</span>'; }
						html += '</li>';
					}

					html += '</ul>';
					html += '</div>';

					document.getElementById("containers").innerHTML = html;
				});
		});
	}
	
	var url = "api.php?container&first";
	
	fetch(url).then(
		function(response){
			if (response.status != 200) {
				console.log("Looks like there was a problem. Status Code: " + response.status);
				return;
			}
					
			response.json().then(function(data) {
				//alert(JSON.stringify(data));
				letters = data;  
				var html = '';
				html += '<ul style="list-style-type: none;">';
				for (var i in letters) {
					html += '<li style="float: left;padding:0.3em"><a href="#" onclick="list_containers(\'' + i + '\')">' + i + '</a></li>';
				}
				html += '</ul>';
				document.getElementById("letters").innerHTML = html;
				
			});
	});
	
	// Parse a CSL "page" string into [first, last] page numbers, or null.
	// Handles "123-145", en/em dashes, single pages, and abbreviated ends
	// ("123-45" -> 123-145; "1234-7" -> 1234-1237).
	function parsePages(page) {
		if (page === null || page === undefined) return null;
		var s = String(page);
		var m = s.match(/(\d+)\s*[-‐-―]\s*(\d+)/);
		if (m) {
			var a = parseInt(m[1], 10);
			var b = parseInt(m[2], 10);
			if (b < a) {
				var as = String(a), bs = String(b);
				if (bs.length < as.length) {
					b = parseInt(as.substring(0, as.length - bs.length) + bs, 10);
				}
			}
			if (b < a) b = a;
			return [a, b];
		}
		m = s.match(/(\d+)/);
		if (m) { var p = parseInt(m[1], 10); return [p, p]; }
		return null;
	}

	// Convert a pure Roman numeral (e.g. "XLI") to an int; 0 if not Roman.
	function romanToInt(s) {
		s = String(s).toUpperCase().trim();
		if (!/^[IVXLCDM]+$/.test(s)) return 0;
		var map = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
		var total = 0, prev = 0;
		for (var i = s.length - 1; i >= 0; i--) {
			var v = map[s.charAt(i)];
			if (v < prev) { total -= v; } else { total += v; prev = v; }
		}
		return total;
	}

	// Numeric volume for sorting: leading digits, then Roman numerals; else last.
	function volNumber(csl) {
		if (!csl || csl.volume === null || csl.volume === undefined) return Infinity;
		var s = String(csl.volume);
		var m = s.match(/\d+/);
		if (m) return parseInt(m[0], 10);
		var rom = romanToInt(s);
		return rom > 0 ? rom : Infinity;
	}

	// First page number for sorting; missing sorts last.
	function firstPage(csl) {
		var r = parsePages(csl ? csl.page : null);
		return r ? r[0] : Infinity;
	}

	// Build a coverage ruler for one year's articles. ranges: array of [first,last].
	function coverageBar(ranges) {
		if (ranges.length === 0) return '';
		var lo = Infinity, hi = -Infinity;
		for (var i = 0; i < ranges.length; i++) {
			if (ranges[i][0] < lo) lo = ranges[i][0];
			if (ranges[i][1] > hi) hi = ranges[i][1];
		}
		var span = hi - lo;
		if (span <= 0) span = 1;

		var html = '<div class="coverage" title="pp. ' + lo + '–' + hi + '">';
		for (var j = 0; j < ranges.length; j++) {
			var left = (ranges[j][0] - lo) / span * 100;
			var width = (ranges[j][1] - ranges[j][0]) / span * 100;
			html += '<span class="seg" style="left:' + left.toFixed(2) + '%;width:' + width.toFixed(2)
				+ '%;" title="pp. ' + ranges[j][0] + '–' + ranges[j][1] + '"></span>';
		}
		html += '</div>';
		html += '<div class="coverage-caption">pp. ' + lo + '–' + hi + ' · '
			+ ranges.length + ' article' + (ranges.length === 1 ? '' : 's') + ' with page ranges</div>';
		return html;
	}

	function render_works(heading, metaHtml, data) {
		var html = "<h3>" + heading + "</h3>";
		if (metaHtml) html += metaHtml;

		for (var year in data) {
			html += '<h4>' + year + '</h4>';

			// Group this year's articles by (normalised) volume. Pagination resets
			// per volume, so each volume gets its own ruler and page-ordered list.
			var byVol = {};
			for (var k in data[year]) {
				var vkey = volNumber(data[year][k].csl);
				(byVol[vkey] = byVol[vkey] || []).push({ id: k, e: data[year][k] });
			}
			var volKeys = Object.keys(byVol).map(function(x) {
				return x === 'Infinity' ? Infinity : Number(x);
			}).sort(function(a, b) { return a - b; });

			for (var vi = 0; vi < volKeys.length; vi++) {
				var group = byVol[volKeys[vi]];
				group.sort(function(a, b) { return firstPage(a.e.csl) - firstPage(b.e.csl); });

				html += '<h5 style="margin:0.5em 0 0.2em;color:#444;">'
					+ (volKeys[vi] === Infinity ? '(no volume)' : 'Volume ' + volKeys[vi]) + '</h5>';

				// Coverage ruler from this volume's page ranges.
				var ranges = [];
				for (var n = 0; n < group.length; n++) {
					var r = parsePages(group[n].e.csl ? group[n].e.csl.page : null);
					if (r) ranges.push(r);
				}
				html += coverageBar(ranges);

				html += '<ul style="list-style: none;">';
				for (var j = 0; j < group.length; j++) {
					var i = group[j].id;
					var entry = group[j].e;
					var citation = new Cite(entry.csl);

					html += '<li style="padding:0.3em;">';
					html += '<a href="./?cluster=' + encodeURIComponent(i) + '" style="display:inline;">';
					html += citation.format('bibliography', {format: 'html', template: 'apa', lang: 'en' });
					html += '</a>';
					if (entry.cluster_size > 1) {
						html += ' <strong>(' + entry.cluster_size + ' records)</strong>';
					}
					html += '</li>';
				}
				html += '</ul>';
			}
		}

		document.getElementById("works").innerHTML = html;
	}

	var title = urlParams.get('title');
	var cid   = urlParams.get('cid');

	if (cid) {
		// Fetch container doc for display name, then fetch combined works.
		fetch("api.php?id=" + encodeURIComponent(cid)).then(function(response) {
			return response.status === 200 ? response.json() : null;
		}).then(function(meta) {
			var container = (meta && meta[0]) || {};
			var heading = container.name ? escapeHtml(container.name) : escapeHtml(cid);

			var metaHtml = '';
			if (Array.isArray(container.variants) && container.variants.length > 0) {
				metaHtml += '<details style="margin:0.5em 0;">';
				metaHtml += '<summary>' + container.variants.length + ' variant spellings</summary>';
				metaHtml += '<ul style="font-size:0.9em;color:#555;">';
				for (var v of container.variants) {
					metaHtml += '<li><a href="?title=' + encodeURIComponent(v) + '">' + escapeHtml(v) + '</a></li>';
				}
				metaHtml += '</ul></details>';
			}

			fetch("api.php?container&cid=" + encodeURIComponent(cid)).then(function(response) {
				if (response.status != 200) {
					document.getElementById("works").innerHTML = "<h3>" + heading + "</h3>" + metaHtml + "<p>No works found.</p>";
					return;
				}
				response.json().then(function(data) {
					render_works(heading, metaHtml, data);
				});
			});
		});

	} else if (title) {
		// First resolve which container cluster (if any) lists this exact spelling,
		// so we can offer a link from one variant up to the whole cluster.
		fetch("api.php?container&variant=" + encodeURIComponent(title)).then(function(response) {
			return response.status === 200 ? response.json() : null;
		}).then(function(container) {
			var metaHtml = '';
			if (container && container.id) {
				metaHtml = '<p>Part of cluster: <a href="?cid=' + encodeURIComponent(container.id) + '">'
					+ escapeHtml(container.name) + '</a>';
				if (container.junk) { metaHtml += ' <em style="color:#c0392b;">(flagged junk)</em>'; }
				metaHtml += '</p>';
			} else {
				metaHtml = '<p style="color:#999;">Not part of any container cluster.</p>';
			}

			fetch("api.php?container&title=" + encodeURIComponent(title)).then(function(response) {
				if (response.status != 200) {
					document.getElementById("works").innerHTML =
						"<h3>" + escapeHtml(title) + "</h3>" + metaHtml + "<p>No works found.</p>";
					return;
				}
				response.json().then(function(data) {
					render_works(escapeHtml(title), metaHtml, data);
				});
			});
		});

	} else {
		list_containers('A');
	}

</script>

</body>
</html>
