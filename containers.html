<html>
<head>
	<meta charset="UTF-8">
	
	<link rel="stylesheet" href="css/main.css">
	
	<style>
		.multicolumn ul {
			columns: 200px;
			list-style: none;
			font-size:0.8em;
		}
		.multicolumn li {
			width:200px;
			white-space: nowrap; 
			overflow: hidden;
			text-overflow: ellipsis;
			line-height:1.2em;
		}	
			
		.csl-entry {
			text-indent: 2em hanging;
			/*
			padding:0.3em;
			margin-left:1em;
			*/
		}
	</style>
	
	<script src="js/citation.js" type="text/javascript"></script>
	<script>
		const Cite = require('citation-js')
	</script>
	
</head>
<body>

<h1>CiteBank</h1>

<h2>
	<a href=".">Home</a>
	|
	Containers 
	| 
	<a href="authors.html">Authors</a>
	| 
	<a href="years.html">Years</a>	
</h2>

<div id = "letters"></div>

<div style="clear:both;"></div>

<div id = "containers">
<div id = "works">

</div>


<script>
	function escapeHtml(s) {
		if (s === null || s === undefined) return '';
		return String(s)
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;')
			.replace(/'/g, '&#39;');
	}

	const urlParams = new URLSearchParams(window.location.search);

	function list_containers(letter) {

		var url = "api.php?container&letter=" + letter;

		fetch(url).then(
			function(response){
				if (response.status != 200) {
					console.log("Looks like there was a problem. Status Code: " + response.status);
					return;
				}
						
				response.json().then(function(data) {
					var html = "<h2>" + letter + "</h2>";
					
					html += '<div class="multicolumn">';
					html += '<ul>';
					
					for (var i in data) {
						html += '<li><a href="?title=' + encodeURIComponent(data[i]) + '">' + escapeHtml(data[i]) + '</a></li>';
					}
					
					html += '</ul>';
					html += '</div>';
					
					document.getElementById("containers").innerHTML = html;
				});
		});
	}
	
	var url = "api.php?container&first";
	
	fetch(url).then(
		function(response){
			if (response.status != 200) {
				console.log("Looks like there was a problem. Status Code: " + response.status);
				return;
			}
					
			response.json().then(function(data) {
				//alert(JSON.stringify(data));
				letters = data;  
				var html = '';
				html += '<ul style="list-style-type: none;">';
				for (var i in letters) {
					html += '<li style="float: left;padding:0.3em"><a href="#" onclick="list_containers(\'' + i + '\')">' + i + '</a></li>';
				}
				html += '</ul>';
				document.getElementById("letters").innerHTML = html;
				
			});
	});
	
	var title = urlParams.get('title');
	
	if (title) {
		var url = "api.php?container&title=" + encodeURIComponent(title)
		
		fetch(url).then(
			function(response){
				if (response.status != 200) {
					console.log("Looks like there was a problem. Status Code: " + response.status);
					return;
				}
						
				response.json().then(function(data) {
					var html = "<h3>" + escapeHtml(title) + "</h3>";
					
					for (var year in data) {
						html += '<h4>' + year + '</h4>';

						html += '<ul style="list-style: none;">';
						for (var i in data[year]) {
							var citation = new Cite(data[year][i]);
							
							html += '<li style="padding:0.3em;">';
							html += '<a href="./?cluster=' + encodeURIComponent(i) + '">';
							html += citation.format('bibliography', {format: 'html', template: 'apa', lang: 'en' });
							html += '</a>';
							html += '</li>';
						}
						html += '</ul>';

					}

					document.getElementById("works").innerHTML = html;
				});
		});
		
	} else {
		list_containers('A');
	}

</script>

</body>
</html>
