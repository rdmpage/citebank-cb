	function escapeHtml(s) {
		if (s === null || s === undefined) return '';
		return String(s)
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;')
			.replace(/'/g, '&#39;');
	}

	// very crude parsing of names
	function parse_author(author) {
	  var a = {};
	  
	  if (author.family) {
		a.family = author.family;
	  }
	  if (author.given) {
		a.given = author.given;
	  }
	  if (author.literal) {
		a.literal = author.literal;
	  }
	
	  if (!a.family && a.literal) {
		var m = a.literal.match(/(.*),\s*(.*)/);
		if (m) {
		  a.family = m[1];
		  a.given = m[2]
		} else {
		  m = a.literal.match(/(.*)\s+([^\s]+)$/);
		  if (m) {
		   a.family = m[2];
		   a.given = m[1]
		 }
		}
	  }
	  return a;
	}

	// Mirrors the matching/hash view's emit logic: only push truthy ints, so
	// volumes like "Fasc. 62" produce no entry rather than NaN/null.
	function get_hash(doc) {
	  var hash = [];

	  var y = null;
	  if (doc.issued) {
	    if (typeof doc.issued === 'object') {
	      y = parseInt(doc.issued['date-parts'][0][0]);
	    } else {
	      y = parseInt(doc.issued);
	    }
	  }
	  if (y) hash.push(y);

	  if (doc.volume && parseInt(doc.volume)) {
	    hash.push(parseInt(doc.volume));
	  }

	  if (doc['page-first'] && parseInt(doc['page-first'])) {
	    hash.push(parseInt(doc['page-first']));
	  } else if (doc.page) {
	    var m = String(doc.page).match(/(\d+)[-–−|](\d+)/);
	    if (m && parseInt(m[1])) {
	      hash.push(parseInt(m[1]));
	    } else if (parseInt(doc.page)) {
	      hash.push(parseInt(doc.page));
	    }
	  }

	  return hash;
	}
	
	function get_cluster(cluster_id) {
		document.getElementById("cluster").innerHTML = "";
		
		var url = "api.php?clusterid=" + encodeURIComponent(cluster_id);

		fetch(url).then(
			function(response){
				if (response.status != 200) {
					console.log("Looks like there was a problem. Status Code: " + response.status);
					return;
				}
						
				response.json().then(function(data) {
					
					document.getElementById("cluster").innerHTML = JSON.stringify(data, null, 2);
				});
		});
	}
	
// Convert a simple CSL object to OpenURL query
function cslToOpenURL(csl) {
  const parameters = {};

  const cslOpenURLMap = {
    type: 'TY',
    title: 'TI',
    author: 'rft.au',
    'container-title': 'JO',
    ISSN: 'rft.issn',
    'collection-title': 'rft.series',
    volume: 'rft.volume',
    issue: 'rft.issue',
    spage: 'rft.spage',
    epage: 'rft.epage',
    issued: 'rft.date',
    URL: 'rft_id',
    DOI: 'rft_id'
  };

  function add(key, value) {
    if (value === undefined || value === null || value === '') return;

    if (!parameters[key]) {
      parameters[key] = [];
    }

    parameters[key].push(value);
  }

  add('ctx_ver', 'Z39.88-2004');

  for (const [key, value] of Object.entries(csl)) {
    switch (key) {
      case 'type':
        switch (value) {
          case 'article-journal':
          case 'journal-article':
            add('rft_val_fmt', 'info:ofi/fmt:kev:mtx:journal');
            add('genre', 'article');

            if (csl.title) {
              add('rft.atitle', csl.title);
            }

            if (csl['container-title']) {
              add('rft.jtitle', csl['container-title']);
            }
            break;

          case 'book':
          case 'chapter':
          default:
            add('genre', value);

            if (csl.title) {
              add('rft.title', csl.title);
            }
            break;
        }
        break;

      case 'collection-title':
      case 'volume':
      case 'issue':
      case 'URL':
        add(cslOpenURLMap[key], value);
        break;

      case 'DOI':
        add(cslOpenURLMap[key], 'info:doi/' + value);
        break;

      case 'page': {
        const match = value.match(/(.*)-(.*)/);

        if (match) {
          add('rft.spage', match[1]);
          add('rft.epage', match[2]);
        } else {
          add('rft.spage', value);
        }
        break;
      }

      case 'issued':
        if (
          value['date-parts'] &&
          value['date-parts'][0] &&
          value['date-parts'][0][0]
        ) {
          add(cslOpenURLMap[key], value['date-parts'][0][0]);
        }
        break;

      case 'author':
        for (const author of value) {
          if (author.literal) {
            add(cslOpenURLMap[key], author.literal);
          } else {
            const nameParts = [];

            if (author.given) {
              nameParts.push(author.given);
            }

            if (author.family) {
              nameParts.push(author.family);
            }

            const name = nameParts.join(' ').trim();

            if (name !== '') {
              add(cslOpenURLMap[key], name);
            }
          }
        }
        break;

      default:
        break;
    }
  }

  const kv = [];

  for (const [key, values] of Object.entries(parameters)) {
    for (const value of values) {
      kv.push(key + '=' + encodeURIComponent(value));
    }
  }

  return kv.join('&');
}

					html += '<a href="./?cluster=' + encodeURIComponent(entry.cluster_id) + '">';
					html += citation.format('bibliography', {format: 'html', template: 'apa', lang: 'en' });
					html += '</a>';
					if (entry.cluster_size > 1) {

					}
